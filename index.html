        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem 1rem 1rem;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        
        .input-wrapper {
            position: relative;
        }

        .clear-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            display: none;
            transition: color 0.2s ease;
        }
        
        .clear-btn:hover {
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.875rem 2.5rem 0.875rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 0.5rem;
            margin-top: 0.25rem;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .radio-group {
            display: flex;
            gap: 1rem;
        }

        .radio-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }

        .radio-label input {
            display: none;
        }

        .radio-label:has(input:checked) {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: translateY(0);
            box-shadow: none;
        }

        .result-card {
            display: none;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
            padding: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 1rem;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .result-val {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .result-total {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
            text-align: right;
        }
        
        .error-msg {
            color: var(--danger);
            font-size: 0.875rem;
            text-align: center;
            display: none;
            margin-top: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #mapContainer {
            height: 250px;
            width: 100%;
            margin-top: 1rem;
            border-radius: 0.5rem;
            overflow: hidden;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1; /* Keep leaflet under autocomplete */
        }

            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 0.5px;
            padding-bottom: 5px;
        }

        /* Make sure leaflet attribution matches dark theme */
        .leaflet-container {
            font-family: 'Inter', sans-serif;
            background: #1e293b;
        }

<div class="container">
    <h1>Freight Rate Calculator</h1>

    <div class="input-group">
        <label for="origin">Origin</label>
        <div class="input-wrapper">
            <input type="text" id="origin" placeholder="e.g. Houston, TX" autocomplete="off">
            <span class="clear-btn" id="clear-origin">&times;</span>
            <div id="origin-list" class="autocomplete-list"></div>
        </div>
    </div>

    <div class="input-group">
        <label for="destination">Destination</label>
        <div class="input-wrapper">
            <input type="text" id="destination" placeholder="e.g. Dallas, TX" autocomplete="off">
            <span class="clear-btn" id="clear-dest">&times;</span>
            <div id="dest-list" class="autocomplete-list"></div>
        </div>
    </div>

    <div class="input-group">
        <label>Freight Type</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="freightType" value="liquid" checked>
                Liquid / Dry
            </label>
            <label class="radio-label">
                <input type="radio" name="freightType" value="nh3">
                NH3 / Inds.
            </label>
        </div>
    </div>

    <button id="calcBtn">
        <span id="btnText">Calculate Rate</span>
        <div class="loader" id="btnLoader"></div>
    </button>
    
    <div class="error-msg" id="errorMsg"></div>

    <div class="result-card" id="resultCard">
        <div class="result-row">
            <span class="result-label">Distance</span>
            <span class="result-val" id="resDistance">-- miles</span>
        </div>
        <div class="result-row" style="margin-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
            <span class="result-label">Estimated Rate</span>
            <span class="result-total" id="resRate">$0.00</span>
        </div>
        <div id="mapContainer"></div>
    </div>
    
    <div class="version-footer">
        v1.2.0 | Rates Effective 2026 Mar 30
    </div>
</div>

    function getRate(miles, type) {
        let sortedRates = type === 'liquid' ? ratesLiquidDry : ratesNH3;
        
        // Return minimum rate if below shortest distance
        if (miles <= sortedRates[0][0]) return sortedRates[0][1];
        
        // Find matching or next highest mileage step
        for (let i = 0; i < sortedRates.length; i++) {
            if (miles <= sortedRates[i][0]) {
                return sortedRates[i][1];
            }
        }
        
        // If miles exceed the highest value in table, use the per-mile cost ratio of the max limit
        let maxStep = sortedRates[sortedRates.length - 1];
        let maxRatePerMile = maxStep[1] / maxStep[0];
        return parseFloat((miles * maxRatePerMile).toFixed(2));
    }
    
    // Autocomplete Logic
    let debounceTimer;
    function setupAutocomplete(inputId, listId, clearBtnId) {
        let input = document.getElementById(inputId);
        let list = document.getElementById(listId);
        let clearBtn = document.getElementById(clearBtnId);
        
        clearBtn.addEventListener('click', function() {
            input.value = '';
            input.removeAttribute('data-lat');
            input.removeAttribute('data-lon');
            clearBtn.style.display = 'none';
            list.style.display = 'none';
            input.focus();
        });
        
        input.addEventListener('input', function() {
            input.removeAttribute('data-lat');
            input.removeAttribute('data-lon');
            clearBtn.style.display = this.value.length > 0 ? 'block' : 'none';
            
            clearTimeout(debounceTimer);
            let val = this.value.trim().toLowerCase();
            if (val.length < 2) {
                list.style.display = 'none';
                return;
            }
            
            debounceTimer = setTimeout(() => {
                list.innerHTML = '';
                let hasResults = false;
                
                let matches = popLocs.filter(loc => loc.n.toLowerCase().includes(val) || loc.c.toLowerCase().includes(val));
                if (matches.length > 0) {
                    hasResults = true;
                    matches.forEach(m => {
                        let div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<strong>${m.n}</strong> <span style="font-size: 0.75rem; color: #94a3b8;">(${m.c})</span>`;
                        div.onclick = function() {
                            input.value = m.n;
                            input.setAttribute('data-lat', m.lat);
                            input.setAttribute('data-lon', m.lon);
                            list.style.display = 'none';
                        };
                        list.appendChild(div);
                    });
                    list.style.display = 'block'; // Show local results instantly
                } else {
                    list.style.display = 'none';
                }
                
                // Fetch fallback online dynamically matching text without blocking ui
                fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=10`)
                    .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                    .then(data => {
                        let usFeatures = (data.features || []).filter(f => f.properties.countrycode === 'US').slice(0, 5);
                        if (usFeatures.length > 0) {
                            if (hasResults) {
                                let sep = document.createElement('div');
                                sep.style = "padding: 0.25rem 1rem; font-size: 0.7rem; color: #94a3b8; background: rgba(255,255,255,0.05); text-transform: uppercase; font-weight: bold;";
                                sep.innerText = "Other Locations";
                                list.appendChild(sep);
                            }
                            
                            usFeatures.forEach(f => {
                                let props = f.properties;
                                let nameParts = [props.name, props.city || props.town || props.village, props.state, props.country].filter(Boolean);
                                let uniqueParts = [...new Set(nameParts)];
                                let nameText = uniqueParts.join(', ');
                                
                                let div = document.createElement('div');
                                div.className = 'autocomplete-item';
                                div.innerText = nameText;
                                div.onclick = function() {
                                    input.value = nameText;
                                    input.removeAttribute('data-lat');
                                    input.removeAttribute('data-lon');
                                    list.style.display = 'none';
                                };
                                list.appendChild(div);
                            });
                            
                            if (!hasResults) list.style.display = 'block';
                            hasResults = true;
                        }
                    })
                    .catch(e => console.error("Autocomplete online fallback failed:", e));
            }, 100);
        });
        
        // Hide list when clicking outside
        document.addEventListener('click', function(e) {
            if (e.target !== input && e.target !== list && !list.contains(e.target) && e.target !== clearBtn) {
                list.style.display = 'none';
            }
        });
    }

    setupAutocomplete('origin', 'origin-list', 'clear-origin');
    setupAutocomplete('destination', 'dest-list', 'clear-dest');

    async function geocode(address) {
        let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(address)}&limit=10`;
        let res = await fetch(url);
        if (!res.ok) throw new Error("Our location service is temporarily offline. Please try again soon.");
        let data = await res.json();
        let usFeatures = (data.features || []).filter(f => f.properties.countrycode === 'US');
        if (usFeatures.length === 0) throw new Error("Could not find exact location in the US: " + address);
        let coords = usFeatures[0].geometry.coordinates;
        return { lon: coords[0], lat: coords[1] };
    }
    
    async function resolveLocation(inputId) {
        let input = document.getElementById(inputId);
        let lat = input.getAttribute('data-lat');
        let lon = input.getAttribute('data-lon');
        if (lat && lon) {
            return { lat: parseFloat(lat), lon: parseFloat(lon) };
        }
        
        let val = input.value.trim().toLowerCase();
        let exactLocal = popLocs.find(loc => loc.n.toLowerCase() === val || (loc.n + ", " + loc.c).toLowerCase() === val);
        if (exactLocal) {
            return { lat: exactLocal.lat, lon: exactLocal.lon };
        }
        
        return await geocode(input.value);
    }

    function decodePolyline(str) {
        let index = 0, lat = 0, lng = 0, coordinates = [], shift, result, byte, lat_change, lng_change;
        while (index < str.length) {
            byte = null; shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lat_change = ((result & 1) ? ~(result >> 1) : (result >> 1)); lat += lat_change;
            shift = 0; result = 0;
            do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
            lng_change = ((result & 1) ? ~(result >> 1) : (result >> 1)); lng += lng_change;
            // Valhalla uses precision 6 (1e6 factor)
            coordinates.push([lng / 1e6, lat / 1e6]);
        }
        return coordinates;
    }

    async function getDistance(coord1, coord2) {
        // Upgraded to massively parallelized Valhalla routing to prevent OSRM server timeouts
        let payload = {
            locations: [{ lon: coord1.lon, lat: coord1.lat }, { lon: coord2.lon, lat: coord2.lat }],
            costing: "auto",
            costing_options: {
                auto: {
                    // We removed the 'shortest' parameter to enable Practical Routing (fastest time), which aligns with Google Maps and prevents rural-grid algorithmic zig-zagging.
                    // 0.1 strongly penalizes unpaved/gravel roads, favoring asphalt, but still permits last-mile gravel routing if the destination is on a farm.
                    use_unpaved: 0.1
                }
            },
            directions_options: { units: "miles" }
        };
        
        let res = await fetch("https://valhalla1.openstreetmap.de/route", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (!res.ok) throw new Error("Routing service failed. Please try again.");
        let data = await res.json();
        
        if (!data.trip || !data.trip.summary) throw new Error("Could not calculate a viable driving route.");
        
        let miles = parseFloat(data.trip.summary.length.toFixed(1));
        let coordinates = decodePolyline(data.trip.legs[0].shape);
        
        return { miles: miles, geometry: { type: "LineString", coordinates: coordinates } };
    }
    
    let map = null;
    let routeLayer = null;

    function renderMap(geometry) {
        let mapContainer = document.getElementById('mapContainer');
        mapContainer.style.display = 'block';
        
        if (!map) {
            map = L.map('mapContainer');
            // Upgraded to CARTO Voyager tiles to permanently bypass the OSM 403 referer blocks!
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap, &copy; CARTO',
                maxZoom: 19
            }).addTo(map);
        }
        
        if (routeLayer) {
            map.removeLayer(routeLayer);
        }
        
        routeLayer = L.geoJSON(geometry, {
            style: { color: '#3b82f6', weight: 4, opacity: 0.8 }
        }).addTo(map);
        
        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });
        
        // Ensure map renders properly when div becomes visible
        setTimeout(() => map.invalidateSize(), 150);
    }

    document.getElementById('calcBtn').addEventListener('click', async () => {
        let origin = document.getElementById('origin').value.trim();
        let destination = document.getElementById('destination').value.trim();
        let type = document.querySelector('input[name="freightType"]:checked').value;
        
        let msg = document.getElementById('errorMsg');
        let resCard = document.getElementById('resultCard');
        let btnText = document.getElementById('btnText');
        let loader = document.getElementById('btnLoader');
        let btn = document.getElementById('calcBtn');

        msg.style.display = 'none';
        resCard.style.display = 'none';
        document.getElementById('mapContainer').style.display = 'none';

        if (!origin || !destination) {
            msg.innerText = "Please enter both origin and destination cities/zips.";
            msg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';

        try {
            // Handle local attributes or run geocoding seamlessly in parallel
            let [p1, p2] = await Promise.all([
                resolveLocation('origin'),
                resolveLocation('destination')
            ]);
            
            let routeObj = await getDistance(p1, p2);
            let rate = getRate(routeObj.miles, type);
            
            document.getElementById('resDistance').innerText = routeObj.miles.toLocaleString() + " miles";
            document.getElementById('resRate').innerText = "$" + rate.toFixed(2);
            resCard.style.display = 'flex';
            
            renderMap(routeObj.geometry);
            
        } catch (e) {
            msg.innerText = e.message;
            msg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btnText.style.display = 'block';
            loader.style.display = 'none';
        }
    });

    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        });
    }
</script>
